version: '3'

vars:
  CLUSTER: devops-task

tasks:
  default:
    cmds:
      - task --list

  preflight:
    internal: true
    silent: true
    cmds:
      - for: [docker, k3d, kubectl, terraform, mkcert]
        cmd: 'command -v {{.ITEM}} >/dev/null 2>&1 || { echo "missing required tool: {{.ITEM}}"; exit 1; }'
      - 'docker info >/dev/null 2>&1 || { echo "docker is installed but not running"; exit 1; }'

  cluster:
    desc: create the local k3d cluster (1 control-plane + 2 workers)
    deps: [preflight]
    cmds:
      - k3d cluster create --config k3d/cluster.yaml
      - kubectl get nodes -o wide

  certs:
    desc: trust the mkcert CA locally and hand it to cert-manager
    cmds:
      - mkcert -install
      - kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
      - kubectl -n cert-manager create secret tls local-ca --cert="$(mkcert -CAROOT)/rootCA.pem" --key="$(mkcert -CAROOT)/rootCA-key.pem" --dry-run=client -o yaml | kubectl apply -f -

  secrets:
    desc: generate in-cluster credentials, no secret material lives in git
    cmds:
      - for: [database, bookinfo, monitoring]
        cmd: 'kubectl create namespace {{.ITEM}} --dry-run=client -o yaml | kubectl apply -f - >/dev/null'
      - |
        if ! kubectl get secret mysql-credentials -n database >/dev/null 2>&1; then
          kubectl create secret generic mysql-credentials -n database \
            --from-literal=mysql-root-password="$(openssl rand -hex 16)" \
            --from-literal=mysql-password="$(openssl rand -hex 16)" \
            --from-literal=mysql-backup-password="$(openssl rand -hex 16)"
        fi
      - |
        if ! kubectl get secret mysql-credentials -n bookinfo >/dev/null 2>&1; then
          app_pw=$(kubectl get secret mysql-credentials -n database -o jsonpath='{.data.mysql-password}' | base64 -d)
          kubectl create secret generic mysql-credentials -n bookinfo \
            --from-literal=mysql-password="$app_pw"
        fi
      - |
        if ! kubectl get secret grafana-admin -n monitoring >/dev/null 2>&1; then
          kubectl create secret generic grafana-admin -n monitoring \
            --from-literal=admin-user=admin \
            --from-literal=admin-password="$(openssl rand -hex 12)"
        fi

  deploy:
    desc: install argocd and its apps via terraform
    cmds:
      - 'command -v helm >/dev/null 2>&1 && helm repo add argo https://argoproj.github.io/argo-helm --force-update >/dev/null && helm repo update argo >/dev/null || true'
      - terraform -chdir=terraform init
      - terraform -chdir=terraform apply -auto-approve

  up:
    desc: bring the whole environment up
    cmds:
      - task: cluster
      - task: certs
      - task: secrets
      - task: deploy

  down:
    desc: delete the local cluster and terraform state
    cmds:
      - k3d cluster delete {{.CLUSTER}}
      - rm -rf terraform/.terraform terraform/terraform.tfstate terraform/terraform.tfstate.backup
