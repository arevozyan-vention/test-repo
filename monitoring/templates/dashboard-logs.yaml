apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-logs
  labels:
    grafana_dashboard: "1"
data:
  logs.json: |
    {
      "title": "Logs (loki)",
      "uid": "cluster-logs",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Log volume by namespace",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 6},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"expr": "sum by (namespace) (count_over_time({namespace=~\"bookinfo|database|argocd|monitoring\"}[5m]))"}]
        },
        {
          "type": "logs",
          "title": "Bookinfo",
          "gridPos": {"x": 0, "y": 6, "w": 12, "h": 10},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"showTime": true, "wrapLogMessage": true},
          "targets": [{"expr": "{namespace=\"bookinfo\"}"}]
        },
        {
          "type": "logs",
          "title": "MySQL",
          "gridPos": {"x": 12, "y": 6, "w": 12, "h": 10},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"showTime": true, "wrapLogMessage": true},
          "targets": [{"expr": "{namespace=\"database\", pod=~\"mysql-[0-9].*\"}"}]
        },
        {
          "type": "logs",
          "title": "Backup jobs",
          "gridPos": {"x": 0, "y": 16, "w": 24, "h": 8},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"showTime": true, "wrapLogMessage": true},
          "targets": [{"expr": "{namespace=\"database\", pod=~\"mysql-backup.*\"}"}]
        }
      ]
    }
