apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-bookinfo-app
  labels:
    grafana_dashboard: "1"
data:
  bookinfo-app.json: |
    {
      "title": "Bookinfo RED (beyla)",
      "uid": "bookinfo-red",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Requests / sec by service",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [{"expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count[2m]))"}]
        },
        {
          "type": "timeseries",
          "title": "p95 latency by service",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [{"expr": "histogram_quantile(0.95, sum by (le, service_name) (rate(http_server_request_duration_seconds_bucket[5m])))"}]
        },
        {
          "type": "timeseries",
          "title": "5xx / sec by service",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[5m])) or vector(0)"}]
        },
        {
          "type": "timeseries",
          "title": "Avg latency by route",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [{"expr": "sum by (http_route) (rate(http_server_request_duration_seconds_sum[5m])) / sum by (http_route) (rate(http_server_request_duration_seconds_count[5m]))"}]
        }
      ]
    }
