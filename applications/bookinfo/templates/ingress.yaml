{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookinfo
  labels:
    {{- include "bookinfo.labels" . | nindent 4 }}
  {{- if .Values.ingress.issuer }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.issuer }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if and .Values.ingress.host .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.backend }}
                port:
                  number: {{ (index .Values.services .Values.ingress.backend).port }}
    {{- end }}
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.backend }}
                port:
                  number: {{ (index .Values.services .Values.ingress.backend).port }}
{{- end }}
