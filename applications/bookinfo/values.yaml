image:
  hub: docker.io/istio
  tag: 1.20.3
  pullPolicy: IfNotPresent

# ratings-v2 wants these, db name is hardcoded to "test" inside the app
database:
  host: mysql.database.svc.cluster.local
  port: 3306
  user: bookinfo
  existingSecret: mysql-credentials
  passwordKey: mysql-password

ingress:
  enabled: true
  className: traefik
  host: bookinfo.localhost
  tlsSecret: bookinfo-tls
  issuer: local-ca
  backend: productpage

# service names must stay as-is, bookinfo resolves them by hostname
services:
  productpage:
    image: examples-bookinfo-productpage-v1
    replicas: 1
    port: 9080
    serviceType: ClusterIP
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    emptyDirs:
      - name: tmp
        mountPath: /tmp
  details:
    image: examples-bookinfo-details-v1
    replicas: 1
    port: 9080
    serviceType: ClusterIP
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 1Gi
  reviews:
    image: examples-bookinfo-reviews-v3
    replicas: 1
    port: 9080
    serviceType: ClusterIP
    env:
      LOG_DIR: /tmp/logs
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    emptyDirs:
      - name: tmp
        mountPath: /tmp
      - name: wlp-output
        mountPath: /opt/ibm/wlp/output
  ratings:
    image: examples-bookinfo-ratings-v2
    replicas: 1
    port: 9080
    serviceType: ClusterIP
    database: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 1Gi
