# credentials are generated by "task secrets", nothing secret is committed
appNamespace: bookinfo

networkPolicy:
  enabled: true

backup:
  schedule: "*/5 * * * *"
  # match the server major (8.4), a newer client tries to dump 9.x-only objects
  image: mysql:8.4.10
  database: test
  keep: 12
  storage: 1Gi
  storageClassName: ""

mysql:
  fullnameOverride: mysql
  architecture: standalone
  image:
    repository: bitnamilegacy/mysql
    tag: 8.4.5-debian-12-r0
  global:
    security:
      allowInsecureImages: true
  auth:
    database: test
    username: bookinfo
    existingSecret: mysql-credentials
  initdbScripts:
    bookinfo.sh: |
      #!/bin/bash
      pw="${MYSQL_ROOT_PASSWORD:-$(cat "$MYSQL_ROOT_PASSWORD_FILE")}"
      apw="${MYSQL_PASSWORD:-$(cat "$MYSQL_PASSWORD_FILE")}"
      bpw="${MYSQL_BACKUP_PASSWORD}"
      mysql -uroot -p"$pw" test <<SQL
      CREATE TABLE IF NOT EXISTS ratings (
        ReviewID INT NOT NULL,
        Rating INT,
        PRIMARY KEY (ReviewID)
      );
      INSERT IGNORE INTO ratings (ReviewID, Rating) VALUES (1, 5), (2, 4);
      ALTER USER 'bookinfo'@'%' IDENTIFIED WITH mysql_native_password BY '$apw';
      -- read-only user for backups, never root
      CREATE USER IF NOT EXISTS 'backup'@'%' IDENTIFIED WITH mysql_native_password BY '$bpw';
      GRANT SELECT, LOCK TABLES, SHOW VIEW, EVENT, TRIGGER ON test.* TO 'backup'@'%';
      FLUSH PRIVILEGES;
      SQL
  # our own explicit NetworkPolicy replaces the chart's permissive default
  networkPolicy:
    enabled: false
  primary:
    extraFlags: "--mysql-native-password=ON"
    extraEnvVars:
      - name: MYSQL_BACKUP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-credentials
            key: mysql-backup-password
    persistence:
      enabled: true
      size: 2Gi
  metrics:
    enabled: true
    image:
      repository: bitnamilegacy/mysqld-exporter
      tag: 0.17.2-debian-12-r16
    serviceMonitor:
      enabled: true
